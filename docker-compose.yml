services:
  shell-app:
    build:
      context: .
      target: shell
    ports:
      - '8080:80'

  dashboard-mfe:
    build:
      context: .
      target: dashboard
    ports:
      - '8081:80'

  profile-mfe:
    build:
      context: .
      target: profile
    ports:
      - '8082:80'

  billing-mfe:
    build:
      context: .
      target: billing
    ports:
      - '8083:80'
